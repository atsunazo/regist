<style>
:root{--line:#d1d5db;--border:#374151;--bg:#eef2f7;--sheet:#fff;--head:#f3f4f6;--sub:#e0e7ff;--sel:#dbeafe;--auto:#d1fae5;--warn:#fffbeb;--text:#111827;--muted:#6b7280}

body{position:relative}
.page{width:100%;max-width:980px;margin:0 auto;padding:8px;overflow-x:hidden}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}.toolbar button{appearance:none;border:1px solid var(--border);background:#fff;border-radius:10px;padding:10px 14px;font-size:14px;cursor:pointer}.primary{background:#1d4ed8!important;color:#fff!important;border-color:#1d4ed8!important}
.sheet{width:100%;max-width:100%;background:var(--sheet);border:1px solid #cbd5e1;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.05);overflow:hidden}.sheet-inner{padding:8px}.title{text-align:center;font-size:20px;font-weight:700;margin:4px 0 8px}
.controls,.card{border:1px solid var(--line);border-radius:12px;background:#fff;padding:10px}.controls{background:#fafafa;margin-bottom:10px}.controls-row{display:flex;flex-wrap:wrap;gap:8px;align-items:end}.field{min-width:120px;flex:1 1 120px}.field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px}.field input,.field select,.field textarea{width:100%;max-width:100%;border:1px solid #cbd5e1;border-radius:8px;padding:9px 10px;font-size:16px;background:#fff}.field textarea{min-height:72px;resize:vertical}

.toggle-row{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:13px}

.summary-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:12px}.selected-list{min-height:56px;display:flex;flex-wrap:wrap;gap:6px}.pill{display:inline-flex;align-items:center;border:1px solid #cbd5e1;border-radius:999px;padding:4px 8px;font-size:12px;background:#f8fafc}.pill.manual{border-color:#60a5fa;color:#1d4ed8;background:#eff6ff}.pill.auto{border-color:#10b981;color:#047857;background:#ecfdf5}
.mini-table{width:100%;border-collapse:collapse;font-size:12px}.mini-table th,.mini-table td{border:1px solid var(--border);padding:6px;vertical-align:top}.mini-table th{background:var(--head)}
.credit-boxes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.credit-box{border:1px solid #cbd5e1;border-radius:10px;padding:8px}.credit-box strong{font-size:16px}
.validation-item{border:1px solid #e5e7eb;border-radius:8px;padding:8px;font-size:12px;background:#fff;margin-bottom:6px}.validation-item.ok{border-color:#86efac;background:#f0fdf4;color:#166534}.validation-item.warn{border-color:#f59e0b;background:#fffbeb;color:#92400e}
.block-title{font-size:15px;font-weight:700;margin:0 0 6px}.scroll-wrap{width:100%;max-width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior-x:contain;border:1px solid var(--line);border-radius:12px}.sheet-table{width:980px;min-width:980px;max-width:none;border-collapse:collapse;table-layout:fixed}.sheet-table th,.sheet-table td{border:1px solid var(--border);padding:6px;vertical-align:top}.sheet-table th{background:var(--head);text-align:center;font-size:13px}.section-head{background:var(--sub)!important;font-size:14px!important}.period-col{width:54px;text-align:center;font-weight:700}.time-col{width:110px;text-align:center;font-size:12px}
.btn-list,.exam-list{display:flex;flex-direction:column;gap:6px}.priority-box{border:1px dashed #fdba74;background:#fff7ed;border-radius:10px;padding:6px;margin-bottom:6px}.priority-head{font-size:11px;color:#9a3412;font-weight:700;margin-bottom:6px}.subject-btn{width:100%;text-align:left;border:1px solid #cbd5e1;border-radius:10px;background:#fff;padding:10px 8px;font-size:13px;line-height:1.35;display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.subject-main{flex:1;min-width:0;overflow:hidden}.subject-btn.selected{background:var(--sel);border-color:#1d4ed8;color:#1e3a8a;font-weight:700}.subject-btn.auto{background:var(--auto);border-color:#0f766e;color:#065f46;font-weight:700}.subject-btn.locked{background:var(--warn);border-color:#f59e0b;color:#92400e}.subject-btn:disabled{background:#f3f4f6;color:#9ca3af;border-color:#e5e7eb;cursor:not-allowed}.badge-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}.badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:999px;border:1px solid #d1d5db;background:#fff;color:#4b5563}.badge.odd{border-color:#7c3aed;color:#7c3aed}.badge.even{border-color:#ea580c;color:#ea580c}.badge.grade{border-color:#0891b2;color:#0e7490}.badge.auto{border-color:#059669;color:#047857}.need-icon{display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:4px 6px;border-radius:999px;border:1px solid #f59e0b;background:#fff7ed;color:#9a3412;white-space:nowrap}.stage-icon{display:inline-flex;align-items:center;justify-content:center;font-size:11px;padding:4px 6px;border-radius:999px;border:1px solid #7c3aed;background:#f5f3ff;color:#6d28d9;white-space:nowrap}.exam-chip{display:block;width:100%;border:1px solid #d1d5db;border-radius:10px;padding:8px;font-size:13px;background:#fff}.exam-chip.active{background:var(--auto);border-color:#0f766e;color:#065f46;font-weight:700}

<div class="page"><div class="toolbar no-print"><button class="primary" id="printBtn">印刷</button><button id="saveBtn">入力内容を保存</button><button id="loadBtn">保存内容を読込</button><button id="clearBtn">選択をクリア</button></div>
<div class="sheet"><div class="sheet-inner">
<div class="title">次年次受講科目登録シート</div>
<div class="controls no-print"><div class="controls-row"><div class="field"><label>氏名</label><input id="studentName" type="text"></div><div class="field"><label>学籍番号</label><input id="studentNo" type="text"></div><div class="field"><label>次年度の組（1年表示で必要）</label><select id="classSelect"><option value="">未選択</option><option>A</option><option>B</option><option>C</option><option>D</option><option>E</option><option>F</option><option>G</option><option>H</option><option>I</option><option>J</option></select></div><div class="field"><label>現在の修得単位数</label><select id="currentCredits"></select></div><div class="field"><label>現在の体育修得単位数</label><select id="currentPeCredits"></select></div><div class="field"><label>次年次メモ</label><input id="nextGrade" type="text"></div></div>
<div class="judge-grid"><div class="judge-box"><div class="judge-label">今、表示している科目</div><div class="judge-main display-main" id="displayGradeMain">—</div><div class="judge-sub" id="displayGradeSub">現在の修得単位数で決まります。</div></div><div class="judge-box" id="nextJudgeBox"><div class="judge-label">次年度の判定</div><div class="judge-main" id="nextYearMain">—</div><div class="judge-sub" id="nextYearSub">登録後の単位数と必履修条件で決まります。</div></div><div class="judge-box"><div class="judge-label">見方</div><div class="judge-sub">14〜43単位なら2年科目、44単位以上なら3年科目を表示します。44単位以上でも、74単位以上＋必履修条件を満たさないと次年度判定は3年になりません。</div></div></div>
<div class="toggle-row"><input type="checkbox" id="showUnavailable"><label for="showUnavailable">対象外・未達成の科目も表示する</label></div>
<div class="field" style="margin-top:8px"><label>修得済み確認</label><div id="completedRow" class="check-row"></div></div>
<div id="warnBox" class="warn-box"></div></div>
<div class="summary-grid"><div class="card"><h3>選択した科目一覧</h3><div id="selectedList" class="selected-list"></div></div><div class="card"><h3>時間割の見取り図</h3><div id="miniTimetable"></div></div><div class="card"><h3>単位数の見込み</h3><div class="credit-boxes"><div class="credit-box">現在の修得単位数<br><strong id="currentCreditView">0</strong></div><div class="credit-box">来年度登録科目の単位合計<br><strong id="nextSelectedCredits">0</strong></div><div class="credit-box">来年度修得後の見込み単位数<br><strong id="projectedCredits">0</strong></div></div></div><div class="card"><h3>点検メッセージ</h3><div id="validationList"></div></div></div>
<div class="sheet-block"><div class="block-title">面接指導（選択）</div><div class="scroll-wrap"><table class="sheet-table"><tbody id="lessonTableBody"></tbody></table></div></div>

<div class="footer-area"><div class="field"><label>一番下に記入する科目・備考</label><textarea id="freeText"></textarea></div></div>
</div></div></div>

function mandatoryStatus(completedSet, selectedSet){ const all = new Set([...completedSet, ...selectedSet]); const scienceCount=['物理基礎','化学基礎','生物基礎','地学基礎'].filter(x=>all.has(x)).length; const artsCount=['音楽Ⅰ','美術Ⅰ','書道Ⅰ'].filter(x=>all.has(x)).length; const peProjected=getCurrentPeCredits() + (selectedSet.has('体育') ? 3 : 0); const missing=[]; if(!all.has('現代の国語')) missing.push('現代の国語'); if(!all.has('言語文化')) missing.push('言語文化'); if(!all.has('地理総合')) missing.push('地理総合'); if(!all.has('歴史総合')) missing.push('歴史総合'); if(!all.has('公共')) missing.push('公共'); if(!all.has('数学Ⅰ')) missing.push('数学Ⅰ'); if(scienceCount<3) missing.push(`理科基礎3科目（現在 ${scienceCount}）`); if(peProjected<7) missing.push(`体育7単位以上（現在見込 ${peProjected}）`); if(!all.has('保健')) missing.push('保健'); if(artsCount<1) missing.push('芸術1科目'); if(!all.has('英語コミⅠ')) missing.push('英語コミⅠ'); if(!(all.has('家庭基礎')||all.has('家庭総合'))) missing.push('家庭基礎または家庭総合'); if(!all.has('情報Ⅰ')) missing.push('情報Ⅰ'); if(!all.has('総合探究')) missing.push('総合探究'); return {ok: missing.length===0, missing}; }
function getNextYearGrade(){ const current=getCurrentCredits(); const base=baseGradeFromCredits(current); if(base<3) return base; const mandatory=mandatoryStatus(getCompletedSubjects(), selectedUniqueCourseKeys()); return (getProjectedCredits()>=74 && mandatory.ok) ? 3 : 2; }
function stageRuleStatus(courseKey, completedSet, selectedSet){ if(completedSet.has(courseKey)) return {ok:false,text:'修得済みのため登録不可'}; if(courseKey==='体育' && getCurrentPeCredits()>=9) return {ok:false,text:'現在の体育修得単位数が9単位以上のため、新たに体育は受講できません'}; if(['論理国語','文学国語','国語表現','古典探究'].includes(courseKey)) return (completedSet.has('現代の国語') && completedSet.has('言語文化')) ? {ok:true} : {ok:false,text:'現代の国語・言語文化を修得後に登録可'}; if(['日本史探究','世界史探究'].includes(courseKey)) return completedSet.has('歴史総合') ? {ok:true} : {ok:false,text:'歴史総合を修得後に登録可'}; if(['倫理','政治経済'].includes(courseKey)) return completedSet.has('公共') ? {ok:true} : {ok:false,text:'公共を修得後に登録可'}; if(['数学Ⅱ','数学Ｂ'].includes(courseKey)) return completedSet.has('数学Ⅰ') ? {ok:true} : {ok:false,text:'数学Ⅰを修得後に登録可'}; if(courseKey==='数学Ａ') return (completedSet.has('数学Ⅰ') || selectedSet.has('数学Ⅰ')) ? {ok:true} : {ok:false,text:'数学Ⅰの修得後か同時登録で可'}; if(courseKey==='英語コミⅡ') return completedSet.has('英語コミⅠ') ? {ok:true} : {ok:false,text:'英語コミⅠを修得後に登録可'}; if(courseKey==='論理表現Ⅰ') return (completedSet.has('英語コミⅠ') || selectedSet.has('英語コミⅠ')) ? {ok:true} : {ok:false,text:'英語コミⅠの修得後か同時登録で可'}; if(['消費生活','保育基礎','フードデザイン'].includes(courseKey)) return (completedSet.has('家庭基礎') || completedSet.has('家庭総合')) ? {ok:true} : {ok:false,text:'家庭基礎・家庭総合の修得後に登録可'}; if(courseKey==='数学入門') return (!completedSet.has('数学Ⅰ') && !selectedSet.has('数学Ⅰ')) ? {ok:true} : {ok:false,text:'数学Ⅰ未修得のみ登録可（数学Ⅰと同時不可）'}; if(courseKey==='英語入門') return (!completedSet.has('英語コミⅠ') && !selectedSet.has('英語コミⅠ')) ? {ok:true} : {ok:false,text:'英語コミⅠ未修得のみ登録可（英語コミⅠと同時不可）'}; return {ok:true}; }
function eligibleForStudent(opt, grade, cls){ const conds=opt.eligibility||[]; if(!conds.length) return true; if(!grade) return false; return conds.some(c => c.type==='min_grade' ? grade>=c.grade : c.type==='exact_grade' ? grade===c.grade : c.type==='grade1_classes' ? grade===1 && !!cls && c.classes.includes(cls) : false); }
function needPriorityByGrade(opt){ const grade=getDisplayGrade(); const cls=getClassLetter(); const key=courseKeyFromOpt(opt); let showTop=false; if(!grade || !eligibleForStudent(opt,grade,cls)) return {showTop:false}; if(grade===1){ const ownClass=(opt.eligibility||[]).some(c=>c.type==='grade1_classes'&&cls&&c.classes.includes(cls)); if(ownClass || key==='総合探究') showTop=true; } if(grade===2 && (key==='家庭総合'||key==='体育')) showTop=true; if(grade===3 && (key==='情報Ⅰ'||key==='体育'||key==='フードデザイン')) showTop=true; return {showTop}; }
function buildImpactList(section, period, label){ const impacts=[]; const queue=[{section,period:String(period),label,reason:'manual'}]; const seen=new Set(); while(queue.length){ const item=queue.shift(); const key=optionKey(item.section,item.period,item.label); if(seen.has(key)) continue; seen.add(key); const opt=getOption(item.section,item.period,item.label); if(!opt) continue; impacts.push({...item, courseKey:courseKeyFromOpt(opt)}); if(opt.syncAcrossXY && opt.examSubject){ const otherSection=item.section.startsWith('X') ? 'Y面接指導' : 'X面接指導'; const otherSlot=getSlot(otherSection,item.period); if(otherSlot) otherSlot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>queue.push({section:otherSection,period:item.period,label:o.label,reason:'auto-xy'})); } if(opt.syncConsecutive && opt.examSubject && (item.period==='2' || item.period==='3')){ const otherPeriod=item.period==='2' ? '3' : '2'; const sameSlot=getSlot(item.section,otherPeriod); if(sameSlot) sameSlot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>queue.push({section:item.section,period:otherPeriod,label:o.label,reason:'auto-seq'})); } } return impacts; }
function slotSelections(comp,section,period){ return (comp[section][period]||[]).slice(); }
function canPlaceInSlot(comp, section, period, opt){ const current = slotSelections(comp,section,period); if(current.some(x=>x.label===opt.label)) return {ok:true}; if(current.length===0) return {ok:true}; if(current.length===1){ const only=current[0]; if(only.parity && opt.parity && only.parity!==opt.parity) return {ok:true}; } const blocking=current.map(x=>`${section.replace('面接指導','')}${period}:${displayLabel(x.label)}`).join(' / '); return {ok:false, reason:`${section.replace('面接指導','')}${period} に別の科目（${blocking}）が入っています。`}; }
function existingCourseLocations(comp){ const map={}; LESSON_SECTIONS.forEach(sec=>{ Object.entries(comp[sec]||{}).forEach(([p,items])=>{ (items||[]).forEach(it=>{ const opt=getOption(sec,p,it.label); if(!opt) return; const key=courseKeyFromOpt(opt); (map[key]||(map[key]=[])).push({section:sec,period:p,label:it.label}); }); }); }); return map; }
function examCountsFromComputed(comp){ const by={'X試験':new Set(),'Y試験':new Set()}; LESSON_SECTIONS.forEach(sec=>{ Object.entries(comp[sec]||{}).forEach(([p,items])=>{ (items||[]).forEach(it=>{ const opt=getOption(sec,p,it.label); if(!opt||!opt.examSubject) return; (EXAM_INDEX[normalizeExam(opt.examSubject)]||[]).forEach(loc=>by[loc.section].add(normalizeExam(opt.examSubject))); }); }); }); return {'X試験':by['X試験'].size,'Y試験':by['Y試験'].size}; }
function recomputeFromManual(manualState){ const comp={'X面接指導':{},'Y面接指導':{}}; const seen=new Set(); const queue=[]; const grade=getDisplayGrade(); const cls=getClassLetter(); const completed=getCompletedSubjects(); function enqueue(section, period, label, reason){ const key=optionKey(section,period,label); if(seen.has(key)) return; const opt=getOption(section,period,label); if(!opt) return; if(!eligibleForStudent(opt,grade,cls)) return; seen.add(key); queue.push({section,period:String(period),label,reason}); }
  LESSON_SECTIONS.forEach(section=>{ Object.entries(manualState[section]||{}).forEach(([period,labels])=> (labels||[]).forEach(label=>enqueue(section,period,label,'manual'))); });
  while(queue.length){ const item=queue.shift(); const opt=getOption(item.section,item.period,item.label); if(!opt) continue; const currentKeys=selectedCourseKeysFromComputed(comp); const stage=stageRuleStatus(courseKeyFromOpt(opt), completed, currentKeys); if(!stage.ok) continue; if(!comp[item.section][item.period]) comp[item.section][item.period]=[]; if(comp[item.section][item.period].some(x=>x.label===item.label)) continue; const placement=canPlaceInSlot(comp,item.section,item.period,opt); if(!placement.ok) continue; comp[item.section][item.period].push({label:item.label,reason:item.reason,parity:opt.parity,examSubject:opt.examSubject}); if(opt.syncAcrossXY && opt.examSubject){ const other=item.section.startsWith('X') ? 'Y面接指導' : 'X面接指導'; const slot=getSlot(other,item.period); if(slot) slot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>enqueue(other,item.period,o.label,'auto-xy')); } if(opt.syncConsecutive && opt.examSubject && (item.period==='2' || item.period==='3')){ const otherP=item.period==='2' ? '3' : '2'; const slot=getSlot(item.section,otherP); if(slot) slot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>enqueue(item.section,otherP,o.label,'auto-seq')); } }
  return comp; }

function selectedEntry(section,period,label){ return currentItems(section,period).find(x=>x.label===label) || null; }
function isSelected(section,period,label){ return !!selectedEntry(section,period,label); }
function checkIfManualSelectable(section,period,label){ const opt=getOption(section,period,label); const grade=getDisplayGrade(); const cls=getClassLetter(); const completed=getCompletedSubjects(); if(!opt) return {ok:false,reason:'科目情報が見つかりません。'}; if(!eligibleForStudent(opt,grade,cls)) return {ok:false,reason:`学年・組が対象外です。`}; if(isSelected(section,period,label)) return {ok:true}; const impacts=buildImpactList(section,period,label); const impactLocs=new Set(impacts.map(x=>`${x.section}|${x.period}|${x.label}`)); let temp=recomputeFromManual(STATE.manual); const currentMap=existingCourseLocations(temp); const impactKeys=[...new Set(impacts.map(x=>x.courseKey))]; for(const key of impactKeys){ const existing=(currentMap[key]||[]).filter(loc=>!impactLocs.has(`${loc.section}|${loc.period}|${loc.label}`)); if(existing.length){ const details=existing.map(loc=>`${loc.section.replace('面接指導','')}${loc.period}:${displayLabel(loc.label)}`).join(' / '); return {ok:false,reason:`同じ名前の講座は1系列のみ。既に ${details} を選択済みです。`}; }} for(const imp of impacts){ const impOpt=getOption(imp.section,imp.period,imp.label); if(!impOpt) continue; const selectedKeys=selectedCourseKeysFromComputed(temp); const stage=stageRuleStatus(imp.courseKey, completed, selectedKeys); if(!stage.ok) return {ok:false,reason:stage.text}; if((temp[imp.section][imp.period]||[]).some(x=>x.label===imp.label)) continue; const placement=canPlaceInSlot(temp,imp.section,imp.period,impOpt); if(!placement.ok) return {ok:false,reason:placement.reason}; if(!temp[imp.section][imp.period]) temp[imp.section][imp.period]=[]; temp[imp.section][imp.period].push({label:imp.label,reason:imp.reason,parity:impOpt.parity,examSubject:impOpt.examSubject}); }
  let total=0; selectedCourseKeysFromComputed(temp).forEach(k=> total += Number(UNITS[k]||0)); if(total>30) return {ok:false,reason:`登録単位数の上限30単位を超えます（${total}単位）。`}; const counts=examCountsFromComputed(temp); if(counts['X試験']>6) return {ok:false,reason:`X試験が6件を超えます。`}; if(counts['Y試験']>6) return {ok:false,reason:`Y試験が6件を超えます。`}; return {ok:true}; }
function isDisabled(section,period,opt){ if(isSelected(section,period,opt.label)) return false; return !checkIfManualSelectable(section,period,opt.label).ok; }
function buttonClass(section,period,opt){ const selected=selectedEntry(section,period,opt.label); const cls=['subject-btn']; if(needPriorityByGrade(opt).showTop) cls.push('prio'); if(selected) cls.push(selected.reason==='manual' ? 'selected' : 'auto'); else if(!checkIfManualSelectable(section,period,opt.label).ok && eligibleForStudent(opt,getDisplayGrade(),getClassLetter())) cls.push('locked'); return cls.join(' '); }
function deselectByCourseKey(section, period, label){ const opt=getOption(section,period,label); if(!opt) return; const key=courseKeyFromOpt(opt); LESSON_SECTIONS.forEach(sec=>{ Object.keys(STATE.manual[sec]||{}).forEach(p=>{ STATE.manual[sec][p]=(STATE.manual[sec][p]||[]).filter(lbl=>{ const o=getOption(sec,p,lbl); return o ? courseKeyFromOpt(o)!==key : true; }); if(!(STATE.manual[sec][p]||[]).length) delete STATE.manual[sec][p]; }); }); }
function toggleManual(section,period,label){ const current=selectedEntry(section,period,label); if(current){ deselectByCourseKey(section,period,label); setWarning(''); rerender(); return; } if(!STATE.manual[section][period]) STATE.manual[section][period]=[]; const chk=checkIfManualSelectable(section,period,label); if(!chk.ok){ setWarning(chk.reason); rerender(); return; } STATE.manual[section][period].push(label); setWarning(''); rerender(); }
function renderCompletedRow(){ const root=document.getElementById('completedRow'); root.innerHTML = COMPLETION_CHECKS.map(name=>`<label class="check-pill"><input type="checkbox" id="comp_${name}"><span class="check-box"></span><span class="check-text">${name}</span></label>`).join(''); }
function mirrorFields(){ const displayGrade=getDisplayGrade(), nextGrade=getNextYearGrade(), current=getCurrentCredits(); document.getElementById('displayGradeMain').textContent=displayGrade + '年科目'; document.getElementById('displayGradeSub').textContent = displayGrade===1 ? '現在の修得単位数が 0〜13 単位なので、1年科目を表示しています。' : displayGrade===2 ? '現在の修得単位数が 14〜43 単位なので、2年科目を表示しています。' : '現在の修得単位数が 44 単位以上なので、3年科目を表示しています。'; document.getElementById('nextYearMain').textContent='次年度 ' + nextGrade + '年'; if(nextGrade===3){ document.getElementById('nextYearMain').className='judge-main next-ok'; } else { document.getElementById('nextYearMain').className='judge-main next-warn'; } if(baseGradeFromCredits(current)<3){ document.getElementById('nextYearSub').textContent='現在の単位数では次年度判定は ' + nextGrade + '年です。'; } else { const mandatory=mandatoryStatus(getCompletedSubjects(), selectedUniqueCourseKeys()); document.getElementById('nextYearSub').textContent = nextGrade===3 ? '登録後 74 単位以上かつ必履修条件を満たす見込みなので、次年度は 3年判定です。' : '3年科目は表示していますが、次年度 3年になるには「登録後 74 単位以上」と「必履修条件の充足」が必要です。' + (!mandatory.ok ? '（現在は未充足あり）' : ''); }
  document.getElementById('currentCreditView').textContent=getCurrentCredits(); document.getElementById('nextSelectedCredits').textContent=selectedCreditTotal(); document.getElementById('projectedCredits').textContent=getProjectedCredits(); const classSel=document.getElementById('classSelect'); classSel.disabled = displayGrade!==1; if(displayGrade!==1) classSel.value=''; }
function renderSelectedList(){ const root=document.getElementById('selectedList'); const items=[]; LESSON_SECTIONS.forEach(sec=>{ Object.entries(STATE.computed[sec]||{}).forEach(([p,vals])=>{ (vals||[]).forEach(v=>items.push({section:sec,period:p,...v})); }); }); items.sort((a,b)=>Number(a.period)-Number(b.period)||a.section.localeCompare(b.section)); root.innerHTML = items.length ? items.map(x=>{ const opt=getOption(x.section,x.period,x.label); const key=opt?courseKeyFromOpt(opt):displayLabel(x.label); const unit=UNITS[key]||''; return `<span class="pill ${x.reason==='manual'?'manual':'auto'}">${x.section.replace('面接指導','')}${x.period}・${displayLabel(x.label)}${unit ? ' ('+unit+'単位)' : ''}</span>`; }).join('') : '<span class="note">まだ選択されていません。</span>'; }
function renderMiniTimetable(){ const root=document.getElementById('miniTimetable'); const periods=['1','2','3','4','5','6']; const cell=(sec,p)=>{ const vals=currentItems(sec,p); return vals.length ? vals.map(v=>`<div>${displayLabel(v.label)}</div>`).join('') : '<span class="note">—</span>'; }; root.innerHTML=`<table class="mini-table"><thead><tr><th>区分</th>${periods.map(p=>`<th>${p}限</th>`).join('')}</tr></thead><tbody><tr><th>X</th>${periods.map(p=>`<td>${cell('X面接指導',p)}</td>`).join('')}</tr><tr><th>Y</th>${periods.map(p=>`<td>${cell('Y面接指導',p)}</td>`).join('')}</tr></tbody></table>`; }
function renderLessonTable(){ const tbody=document.getElementById('lessonTableBody'); tbody.innerHTML=''; const grade=getDisplayGrade(), cls=getClassLetter(), includeUnavailable=showUnavailable(); const completed=getCompletedSubjects(), selectedKeys=selectedUniqueCourseKeys(); LESSON_SECTIONS.forEach(section=>{ const secRow=document.createElement('tr'); secRow.innerHTML=`<th class="section-head" colspan="8">${section}</th>`; tbody.appendChild(secRow); const hRow=document.createElement('tr'); hRow.innerHTML=`<th class="period-col">時限</th>` + LESSON_SCHEDULE[section].map(slot=>`<th>${slot.period}限</th>`).join('') + `<th class="time-col">操作</th>`; tbody.appendChild(hRow); const tRow=document.createElement('tr'); tRow.innerHTML=`<th class="time-col">時刻</th>` + LESSON_SCHEDULE[section].map(slot=>`<td style="text-align:center;font-size:12px;">${slot.time}</td>`).join('') + `<td style="text-align:center;"><button type="button" class="no-print" data-clear-section="${section}">この区分をクリア</button></td>`; tbody.appendChild(tRow); const bRow=document.createElement('tr'); bRow.innerHTML=`<th class="period-col">科目</th>` + LESSON_SCHEDULE[section].map(slot=>{ const base=slot.options.map((opt,i)=>({opt,i,eligible:eligibleForStudent(opt,grade,cls),stage:stageRuleStatus(courseKeyFromOpt(opt), completed, selectedKeys),priority:needPriorityByGrade(opt)})); const visible=includeUnavailable ? base : base.filter(x=>x.eligible && x.stage.ok); const prio=visible.filter(x=>x.priority.showTop).sort((a,b)=>a.i-b.i); const normal=visible.filter(x=>!x.priority.showTop).sort((a,b)=>a.i-b.i); const renderBtn=meta=>{ const opt=meta.opt; const sel=selectedEntry(section,slot.period,opt.label); const disabled=isDisabled(section,slot.period,opt); const chk=checkIfManualSelectable(section,slot.period,opt.label); const title=(!sel && !chk.ok) ? chk.reason : (!meta.stage.ok ? meta.stage.text : ''); const badges=[]; if(opt.parity==='odd') badges.push('<span class="badge odd">奇数</span>'); if(opt.parity==='even') badges.push('<span class="badge even">偶数</span>'); eligibilityBadgeTexts(opt).forEach(t=>badges.push(`<span class="badge grade">${t}</span>`)); if(sel && sel.reason!=='manual') badges.push('<span class="badge auto">自動</span>'); const icon=(MANDATORY_ICON_SET.has(courseKeyFromOpt(opt))?'<span class="need-icon">必修</span>':'') + (!meta.stage.ok ? '<span class="stage-icon">段階</span>' : ''); const unitText=UNITS[courseKeyFromOpt(opt)] ? `（${UNITS[courseKeyFromOpt(opt)]}単位）` : ''; return `<button type="button" title="${String(title).replace(/"/g,'&quot;')}" class="${buttonClass(section,slot.period,opt)}" data-section="${section}" data-period="${slot.period}" data-label="${opt.label.replace(/"/g,'&quot;')}" ${disabled?'disabled':''}><div class="subject-main"><div>${displayLabel(opt.label)}${unitText}</div>${badges.length?`<div class="badge-row">${badges.join('')}</div>`:''}${(!meta.stage.ok&&includeUnavailable)?`<div class="note">${meta.stage.text}</div>`:''}</div>${icon}</button>`; }; let html=''; if(prio.length) html += `<div class="priority-box"><div class="priority-head">優先して受講したい科目</div><div class="btn-list">${prio.map(renderBtn).join('')}</div></div>`; if(normal.length) html += `<div class="btn-list">${normal.map(renderBtn).join('')}</div>`; if(!visible.length) html += '<div class="note">該当する科目はありません</div>'; return `<td>${html}</td>`; }).join('') + `<td class="note">表示科目は現在単位数で判定</td>`; tbody.appendChild(bRow); }); }
function activeExamSubjects(){ const set=new Set(); LESSON_SECTIONS.forEach(sec=>{ Object.entries(STATE.computed[sec]||{}).forEach(([p,items])=>{ (items||[]).forEach(it=>{ const opt=getOption(sec,p,it.label); if(opt&&opt.examSubject&&EXAM_INDEX[normalizeExam(opt.examSubject)]) set.add(normalizeExam(opt.examSubject)); }); }); }); return set; }
function renderExamTable(){ const active=activeExamSubjects(); const tbody=document.getElementById('examTableBody'); tbody.innerHTML=''; EXAM_SECTIONS.forEach(section=>{ const secRow=document.createElement('tr'); secRow.innerHTML=`<th class="section-head" colspan="7">${section}</th>`; tbody.appendChild(secRow); const hRow=document.createElement('tr'); hRow.innerHTML=`<th class="period-col">時限</th>` + EXAM_SCHEDULE[section].map(slot=>`<th>${slot.period}限</th>`).join(''); tbody.appendChild(hRow); const tRow=document.createElement('tr'); tRow.innerHTML=`<th class="time-col">時刻</th>` + EXAM_SCHEDULE[section].map(slot=>`<td style="text-align:center;font-size:12px;">${slot.time}</td>`).join(''); tbody.appendChild(tRow); const bRow=document.createElement('tr'); bRow.innerHTML=`<th class="period-col">科目</th>` + EXAM_SCHEDULE[section].map(slot=>`<td><div class="exam-list">${slot.options.map(opt=>`<div class="exam-chip ${active.has(normalizeExam(opt))?'active':''}">${opt}</div>`).join('')}</div></td>`).join(''); tbody.appendChild(bRow); }); }
function renderValidationList(){ const root=document.getElementById('validationList'); const items=[]; const credits=selectedCreditTotal(); items.push({ok:true,text:'【表示科目】現在単位数 ' + getCurrentCredits() + ' → ' + getDisplayGrade() + '年科目を表示'}); items.push({ok:true,text:'【次年度判定】現在は ' + getNextYearGrade() + '年判定'}); items.push({ok:credits<=30,text: credits<=30 ? `登録単位数 ${credits} / 30 単位` : `登録単位数が上限30単位を超えています（${credits}単位）`}); const counts=examCountsFromComputed(STATE.computed); items.push({ok:counts['X試験']<=6,text: counts['X試験']<=6 ? `X試験 ${counts['X試験']} 件 / 6 件以内` : `X試験が6件を超えています`}); items.push({ok:counts['Y試験']<=6,text: counts['Y試験']<=6 ? `Y試験 ${counts['Y試験']} 件 / 6 件以内` : `Y試験が6件を超えています`}); const mandatory=mandatoryStatus(getCompletedSubjects(), selectedUniqueCourseKeys()); items.push({ok:mandatory.ok,text: mandatory.ok ? '必履修条件：登録後に充足見込み' : `必履修条件：未充足（${mandatory.missing.join('、')}）`}); if(baseGradeFromCredits(getCurrentCredits())>=3){ const ok=(getProjectedCredits()>=74 && mandatory.ok); items.push({ok,text: ok ? '3年判定：74単位以上かつ必履修条件を満たすため3年' : '3年科目は表示中。次年度3年になるには「見込74単位以上」と「必履修条件の充足」が必要です。'}); } root.innerHTML=items.map(m=>`<div class="validation-item ${m.ok?'ok':'warn'}">${m.text}</div>`).join(''); }
function rerender(){ recalcComputed(); mirrorFields(); renderSelectedList(); renderMiniTimetable(); renderLessonTable(); renderExamTable(); renderValidationList(); }
function recalcComputed(){ STATE.computed = recomputeFromManual(STATE.manual); }
function collectCompletedMap(){ const map={}; COMPLETION_CHECKS.forEach(name=>{ const el=document.getElementById(`comp_${name}`); map[name]=!!(el&&el.checked); }); return map; }
function applyCompletedMap(map){ COMPLETION_CHECKS.forEach(name=>{ const el=document.getElementById(`comp_${name}`); if(el) el.checked=!!(map&&map[name]); }); }
function collectState(){ return { studentName:document.getElementById('studentName').value, studentNo:document.getElementById('studentNo').value, classLetter:document.getElementById('classSelect').value, nextGrade:document.getElementById('nextGrade').value, freeText:document.getElementById('freeText').value, currentCredits:document.getElementById('currentCredits').value, currentPeCredits:document.getElementById('currentPeCredits').value, showUnavailable:document.getElementById('showUnavailable').checked, completedMap:collectCompletedMap(), manual:STATE.manual }; }
function applyState(data){ document.getElementById('studentName').value=data.studentName||''; document.getElementById('studentNo').value=data.studentNo||''; document.getElementById('classSelect').value=data.classLetter||''; document.getElementById('nextGrade').value=data.nextGrade||''; document.getElementById('freeText').value=data.freeText||''; document.getElementById('currentCredits').value=(data.currentCredits??0); document.getElementById('currentPeCredits').value=(data.currentPeCredits??0); document.getElementById('showUnavailable').checked=!!data.showUnavailable; applyCompletedMap(data.completedMap||{}); STATE.manual=clone(data.manual || {'X面接指導':{},'Y面接指導':{}}); STATE.lastWarning=''; rerender(); }
function clearSection(section){ STATE.manual[section]={}; setWarning(''); rerender(); }
window.addEventListener('click', e=>{ const btn=e.target.closest('.subject-btn'); if(btn){ toggleManual(btn.dataset.section, btn.dataset.period, btn.dataset.label); return; } const clr=e.target.closest('[data-clear-section]'); if(clr){ clearSection(clr.dataset.clearSection); return; } });
function bindReRender(id){ const el=document.getElementById(id); if(!el) return; el.addEventListener('input', ()=>{ setWarning(''); rerender(); }); el.addEventListener('change', ()=>{ setWarning(''); rerender(); }); }
['studentName','studentNo','classSelect','nextGrade','freeText','currentCredits','currentPeCredits','showUnavailable'].forEach(bindReRender);
document.getElementById('printBtn').addEventListener('click',()=>window.print());
document.getElementById('saveBtn').addEventListener('click',()=>{ localStorage.setItem('subjectRegisterRulesV24', JSON.stringify(collectState())); alert('入力内容を保存しました。'); });
document.getElementById('loadBtn').addEventListener('click',()=>{ const raw=localStorage.getItem('subjectRegisterRulesV24'); if(!raw) return alert('保存データがありません。'); applyState(JSON.parse(raw)); alert('保存データを読み込みました。'); });
document.getElementById('clearBtn').addEventListener('click',()=>{ applyState({ studentName:'', studentNo:'', classLetter:'', nextGrade:'', freeText:'', currentCredits:0, currentPeCredits:0, showUnavailable:false, completedMap:{}, manual:{'X面接指導':{},'Y面接指導':{}} }); });
populateSelectOptions();
renderCompletedRow();
COMPLETION_CHECKS.forEach(name=>bindReRender(`comp_${name}`));
applyState({ studentName:'', studentNo:'', classLetter:'', nextGrade:'', freeText:'', currentCredits:0, currentPeCredits:0, showUnavailable:false, completedMap:{}, manual:{'X面接指導':{},'Y面接指導':{}} });
</script></body></html>

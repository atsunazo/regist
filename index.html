function existingCourseLocations(comp){const map={}; LESSON_SECTIONS.forEach(sec=>Object.entries(comp[sec]||{}).forEach(([p,items])=>(items||[]).forEach(it=>{const opt=getOption(sec,p,it.label); if(!opt)return; const k=courseKeyFromOpt(opt); (map[k]||(map[k]=[])).push({section:sec,period:p,label:it.label})}))); return map}
function examCountsFromComputed(comp){const by={'X試験':new Set(),'Y試験':new Set()}; LESSON_SECTIONS.forEach(sec=>Object.entries(comp[sec]||{}).forEach(([p,items])=>(items||[]).forEach(it=>{const opt=getOption(sec,p,it.label); if(!opt||!opt.examSubject)return; (EXAM_INDEX[normalizeExam(opt.examSubject)]||[]).forEach(loc=>by[loc.section].add(normalizeExam(opt.examSubject))) }))); return {'X試験':by['X試験'].size,'Y試験':by['Y試験'].size}}
function recomputeFromManual(manual){const comp={'X面接指導':{},'Y面接指導':{}},seen=new Set(),queue=[],grade=getDisplayGrade(),cls=getClassLetter(),completed=getCompletedSubjects(); const enqueue=(sec,p,l,reason)=>{const key=optionKey(sec,p,l); if(seen.has(key))return; const opt=getOption(sec,p,l); if(!opt)return; if(!eligibleForStudent(opt,grade,cls))return; seen.add(key); queue.push({section:sec,period:String(p),label:l,reason})}; LESSON_SECTIONS.forEach(sec=>Object.entries(manual[sec]||{}).forEach(([p,labels])=>(labels||[]).forEach(l=>enqueue(sec,p,l,'manual')))); while(queue.length){const item=queue.shift(), opt=getOption(item.section,item.period,item.label); if(!opt)continue; const currentKeys=selectedCourseKeysFromComputed(comp), stage=stageRuleStatus(courseKeyFromOpt(opt),completed,currentKeys); if(!stage.ok)continue; if(!comp[item.section][item.period])comp[item.section][item.period]=[]; if(comp[item.section][item.period].some(x=>x.label===item.label))continue; const placement=canPlaceInSlot(comp,item.section,item.period,opt); if(!placement.ok)continue; comp[item.section][item.period].push({label:item.label,reason:item.reason,parity:opt.parity,examSubject:opt.examSubject}); if(opt.syncAcrossXY&&opt.examSubject){const other=item.section.startsWith('X')?'Y面接指導':'X面接指導'; const slot=getSlot(other,item.period); if(slot)slot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>enqueue(other,item.period,o.label,'auto-xy'))} if(opt.syncConsecutive&&opt.examSubject&&(item.period==='2'||item.period==='3')){const otherP=item.period==='2'?'3':'2'; const slot=getSlot(item.section,otherP); if(slot)slot.options.filter(o=>normalizeExam(o.examSubject)===normalizeExam(opt.examSubject)).forEach(o=>enqueue(item.section,otherP,o.label,'auto-seq'))}} return comp}
const currentItems=(s,p)=>STATE.computed[s][p]||[]; const selectedEntry=(s,p,l)=>currentItems(s,p).find(x=>x.label===l)||null; const isSelected=(s,p,l)=>!!selectedEntry(s,p,l);
function checkIfManualSelectable(section,period,label){const opt=getOption(section,period,label),grade=getDisplayGrade(),cls=getClassLetter(),completed=getCompletedSubjects(); if(!opt)return{ok:false,reason:'科目情報が見つかりません。'}; if(!eligibleForStudent(opt,grade,cls))return{ok:false,reason:'学年・組が対象外です。'}; if(isSelected(section,period,label))return{ok:true}; const impacts=buildImpactList(section,period,label),impactLocs=new Set(impacts.map(x=>`${x.section}|${x.period}|${x.label}`)); let temp=recomputeFromManual(STATE.manual); const currentMap=existingCourseLocations(temp),impactKeys=[...new Set(impacts.map(x=>x.courseKey))]; for(const key of impactKeys){const existing=(currentMap[key]||[]).filter(loc=>!impactLocs.has(`${loc.section}|${loc.period}|${loc.label}`)); if(existing.length){const details=existing.map(loc=>`${loc.section.replace('面接指導','')}${loc.period}:${displayLabel(loc.label)}`).join(' / '); return{ok:false,reason:`同じ名前の講座は1系列のみ。既に ${details} を選択済みです。`}}} for(const imp of impacts){const impOpt=getOption(imp.section,imp.period,imp.label); if(!impOpt)continue; const selectedKeys=selectedCourseKeysFromComputed(temp),stage=stageRuleStatus(imp.courseKey,completed,selectedKeys); if(!stage.ok)return{ok:false,reason:stage.text}; if((temp[imp.section][imp.period]||[]).some(x=>x.label===imp.label))continue; const placement=canPlaceInSlot(temp,imp.section,imp.period,impOpt); if(!placement.ok)return{ok:false,reason:placement.reason}; if(!temp[imp.section][imp.period])temp[imp.section][imp.period]=[]; temp[imp.section][imp.period].push({label:imp.label,reason:imp.reason,parity:impOpt.parity,examSubject:impOpt.examSubject})} let total=0; selectedCourseKeysFromComputed(temp).forEach(k=>total+=Number(UNITS[k]||0)); if(total>30)return{ok:false,reason:`登録単位数の上限30単位を超えます（${total}単位）。`}; const counts=examCountsFromComputed(temp); if(counts['X試験']>6)return{ok:false,reason:'X試験が6件を超えます。'}; if(counts['Y試験']>6)return{ok:false,reason:'Y試験が6件を超えます。'}; return{ok:true}}
function buttonClass(section,period,opt){const selected=selectedEntry(section,period,opt.label); const cls=['subject-btn']; if(needPriorityByGrade(opt).showTop)cls.push('prio'); if(selected)cls.push(selected.reason==='manual'?'selected':'auto'); else if(!checkIfManualSelectable(section,period,opt.label).ok&&eligibleForStudent(opt,getDisplayGrade(),getClassLetter()))cls.push('locked'); return cls.join(' ')}
function deselectByCourseKey(section,period,label){const opt=getOption(section,period,label); if(!opt)return; const key=courseKeyFromOpt(opt); LESSON_SECTIONS.forEach(sec=>Object.keys(STATE.manual[sec]||{}).forEach(p=>{STATE.manual[sec][p]=(STATE.manual[sec][p]||[]).filter(lbl=>{const o=getOption(sec,p,lbl); return o?courseKeyFromOpt(o)!==key:true}); if(!(STATE.manual[sec][p]||[]).length)delete STATE.manual[sec][p]}))}
function toggleManual(section,period,label){const current=selectedEntry(section,period,label); if(current){deselectByCourseKey(section,period,label); setWarning(''); rerender(); return} if(!STATE.manual[section][period])STATE.manual[section][period]=[]; const chk=checkIfManualSelectable(section,period,label); if(!chk.ok){setWarning(chk.reason); rerender(); return} STATE.manual[section][period].push(label); setWarning(''); rerender()}
function renderCompletedRow(){ $('completedRow').innerHTML=COMPLETION_CHECKS.map(name=>`<label class="check-pill"><input type="checkbox" id="comp_${name}"><span class="check-box"></span><span class="check-text">${name}</span></label>`).join('') }
function mirrorFields(){ const displayGrade=getDisplayGrade(),nextGrade=getNextYearGrade(),current=getCurrentCredits(); $('displayGradeMain').textContent=displayGrade+'年科目'; $('displayGradeSub').textContent=displayGrade===1?'現在の修得単位数が 0〜13 単位なので、1年科目を表示しています。':displayGrade===2?'現在の修得単位数が 14〜43 単位なので、2年科目を表示しています。':'現在の修得単位数が 44 単位以上なので、3年科目を表示しています。'; $('nextYearMain').textContent='次年度 '+nextGrade+'年'; $('nextYearMain').className='judge-main '+(nextGrade===3?'next-ok':'next-warn'); if(baseGradeFromCredits(current)<3){$('nextYearSub').textContent='現在の単位数では次年度判定は '+nextGrade+'年です。'} else {const mandatory=mandatoryStatus(getCompletedSubjects(),selectedUniqueCourseKeys()); $('nextYearSub').textContent=nextGrade===3?'登録後 74 単位以上かつ必履修条件を満たす見込みなので、次年度は 3年判定です。':'3年科目は表示していますが、次年度 3年になるには「登録後 74 単位以上」と「必履修条件の充足」が必要です。'+(!mandatory.ok?'（現在は未充足あり）':'')} $('currentCreditView').textContent=getCurrentCredits(); $('nextSelectedCredits').textContent=selectedCreditTotal(); $('projectedCredits').textContent=getProjectedCredits(); const classSel=$('classSelect'); classSel.disabled=displayGrade!==1; if(displayGrade!==1) classSel.value='' }
function renderSelectedList(){ const items=[]; LESSON_SECTIONS.forEach(sec=>Object.entries(STATE.computed[sec]||{}).forEach(([p,vals])=>(vals||[]).forEach(v=>items.push({section:sec,period:p,...v})))); items.sort((a,b)=>Number(a.period)-Number(b.period)||a.section.localeCompare(b.section)); $('selectedList').innerHTML=items.length?items.map(x=>{const opt=getOption(x.section,x.period,x.label), key=opt?courseKeyFromOpt(opt):displayLabel(x.label), unit=UNITS[key]||''; return `<span class="pill ${x.reason==='manual'?'manual':'auto'}">${x.section.replace('面接指導','')}${x.period}・${displayLabel(x.label)}${unit?' ('+unit+'単位)':''}</span>`}).join(''):'<span class="note">まだ選択されていません。</span>' }
function renderMiniTimetable(){ const cell=(sec,p)=>{const vals=currentItems(sec,p); return vals.length?vals.map(v=>`<div>${displayLabel(v.label)}</div>`).join(''):'<span class="note">—</span>'}; $('miniTimetable').innerHTML=`<table class="mini-table"><thead><tr><th>区分</th>${PERIODS.map(p=>`<th>${p}限</th>`).join('')}</tr></thead><tbody><tr><th>X</th>${PERIODS.map(p=>`<td>${cell('X面接指導',p)}</td>`).join('')}</tr><tr><th>Y</th>${PERIODS.map(p=>`<td>${cell('Y面接指導',p)}</td>`).join('')}</tr></tbody></table>` }
function renderTabs(){ $('periodTabs').innerHTML=PERIODS.map(p=>`<button type="button" class="period-tab ${STATE.activePeriod===p?'active':''}" data-period-tab="${p}">${p}限</button>`).join(''); const slotX=getSlot('X面接指導',STATE.activePeriod), slotY=getSlot('Y面接指導',STATE.activePeriod), timeText=[slotX?.time,slotY?.time].filter(Boolean)[0]||''; $('periodMeta').textContent=timeText?`${STATE.activePeriod}限　${timeText}`:`${STATE.activePeriod}限` }
function renderPeriodPanels(){ const period=STATE.activePeriod,grade=getDisplayGrade(),cls=getClassLetter(),includeUnavailable=showUnavailable(),completed=getCompletedSubjects(),selectedKeys=selectedUniqueCourseKeys(); const wrap=document.createElement('div'); wrap.className='sections-grid'; LESSON_SECTIONS.forEach(section=>{const slot=getSlot(section,period), card=document.createElement('div'); card.className='section-card'; if(!slot){card.innerHTML='<div class="note">該当データなし</div>'; wrap.appendChild(card); return} const base=slot.options.map((opt,i)=>({opt,i,eligible:eligibleForStudent(opt,grade,cls),stage:stageRuleStatus(courseKeyFromOpt(opt),completed,selectedKeys),priority:needPriorityByGrade(opt)})); const visible=includeUnavailable?base:base.filter(x=>x.eligible&&x.stage.ok); const prio=visible.filter(x=>x.priority.showTop).sort((a,b)=>a.i-b.i); const normal=visible.filter(x=>!x.priority.showTop).sort((a,b)=>a.i-b.i); const renderBtn=meta=>{const opt=meta.opt, sel=selectedEntry(section,period,opt.label), chk=checkIfManualSelectable(section,period,opt.label), title=(!sel&&!chk.ok)?chk.reason:(!meta.stage.ok?meta.stage.text:''); const badges=[]; if(opt.parity==='odd')badges.push('<span class="badge odd">奇数</span>'); if(opt.parity==='even')badges.push('<span class="badge even">偶数</span>'); eligibilityBadgeTexts(opt).forEach(t=>badges.push(`<span class="badge grade">${t}</span>`)); if(sel&&sel.reason!=='manual')badges.push('<span class="badge auto">自動</span>'); const icon=(MANDATORY_ICON_SET.has(courseKeyFromOpt(opt))?'<span class="need-icon">必修</span>':'')+(!meta.stage.ok?'<span class="stage-icon">段階</span>':''); const unitText=UNITS[courseKeyFromOpt(opt)]?`（${UNITS[courseKeyFromOpt(opt)]}単位）`:''; return `<button type="button" title="${String(title).replace(/"/g,'&quot;')}" class="${buttonClass(section,period,opt)}" data-section="${section}" data-period="${period}" data-label="${opt.label.replace(/"/g,'&quot;')}"><div class="subject-main"><div>${displayLabel(opt.label)}${unitText}</div>${badges.length?`<div class="badge-row">${badges.join('')}</div>`:''}${(!meta.stage.ok&&includeUnavailable)?`<div class="note">${meta.stage.text}</div>`:''}</div>${icon}</button>`}; let html=`<div class="section-head"><div class="section-title">${section}</div><div class="section-time">${slot.time}</div></div>`; if(prio.length)html+=`<div class="priority-box"><div class="priority-head">優先して受講したい科目</div><div class="btn-list">${prio.map(renderBtn).join('')}</div></div>`; html+=normal.length?`<div class="btn-list">${normal.map(renderBtn).join('')}</div>`:'<div class="note">該当する科目はありません</div>'; card.innerHTML=html; wrap.appendChild(card)}); $('periodPanels').innerHTML=''; $('periodPanels').appendChild(wrap)}
function activeExamSubjects(){const set=new Set(); LESSON_SECTIONS.forEach(sec=>Object.entries(STATE.computed[sec]||{}).forEach(([p,items])=>(items||[]).forEach(it=>{const opt=getOption(sec,p,it.label); if(opt&&opt.examSubject&&EXAM_INDEX[normalizeExam(opt.examSubject)])set.add(normalizeExam(opt.examSubject))}))); return set}
function renderExamBlock(){ const active=activeExamSubjects(); $('examBlock').innerHTML=''; EXAM_SECTIONS.forEach(section=>{const sec=document.createElement('div'); sec.className='exam-section'; let html=`<div class="exam-head">${section}</div>`; EXAM_SCHEDULE[section].forEach(slot=>{html+=`<div class="note">${slot.period}限 ${slot.time}</div><div class="exam-chip-row">${slot.options.map(opt=>`<div class="exam-chip ${active.has(normalizeExam(opt))?'active':''}">${opt}</div>`).join('')}</div>`}); sec.innerHTML=html; $('examBlock').appendChild(sec)})}
function renderValidationList(){ const items=[], credits=selectedCreditTotal(); items.push({ok:true,text:'【表示科目】現在単位数 '+getCurrentCredits()+' → '+getDisplayGrade()+'年科目を表示'}); items.push({ok:true,text:'【次年度判定】現在は '+getNextYearGrade()+'年判定'}); items.push({ok:credits<=30,text:credits<=30?`登録単位数 ${credits} / 30 単位`:`登録単位数が上限30単位を超えています（${credits}単位）`}); const counts=examCountsFromComputed(STATE.computed); items.push({ok:counts['X試験']<=6,text:counts['X試験']<=6?`X試験 ${counts['X試験']} 件 / 6 件以内`:'X試験が6件を超えています'}); items.push({ok:counts['Y試験']<=6,text:counts['Y試験']<=6?`Y試験 ${counts['Y試験']} 件 / 6 件以内`:'Y試験が6件を超えています'}); const mandatory=mandatoryStatus(getCompletedSubjects(),selectedUniqueCourseKeys()); items.push({ok:mandatory.ok,text:mandatory.ok?'必履修条件：登録後に充足見込み':`必履修条件：未充足（${mandatory.missing.join('、')}）`}); if(baseGradeFromCredits(getCurrentCredits())>=3){const ok=getProjectedCredits()>=74&&mandatory.ok; items.push({ok,text:ok?'3年判定：74単位以上かつ必履修条件を満たすため3年':'3年科目は表示中。次年度3年になるには「見込74単位以上」と「必履修条件の充足」が必要です。'})} $('validationList').innerHTML=items.map(m=>`<div class="validation-item ${m.ok?'ok':'warn'}">${m.text}</div>`).join('') }
function rerender(){ STATE.computed=recomputeFromManual(STATE.manual); mirrorFields(); renderSelectedList(); renderMiniTimetable(); renderTabs(); renderPeriodPanels(); renderExamBlock(); renderValidationList() }
function collectCompletedMap(){const map={}; COMPLETION_CHECKS.forEach(name=>{const el=$(`comp_${name}`); map[name]=!!(el&&el.checked)}); return map}
function applyCompletedMap(map){COMPLETION_CHECKS.forEach(name=>{const el=$(`comp_${name}`); if(el)el.checked=!!(map&&map[name])})}
function collectState(){return{activePeriod:STATE.activePeriod,studentName:$('studentName').value,studentNo:$('studentNo').value,classLetter:$('classSelect').value,nextGrade:$('nextGrade').value,freeText:$('freeText').value,currentCredits:$('currentCredits').value,currentPeCredits:$('currentPeCredits').value,showUnavailable:$('showUnavailable').checked,completedMap:collectCompletedMap(),manual:STATE.manual}}
function applyState(data){STATE.activePeriod=data.activePeriod||'1'; $('studentName').value=data.studentName||''; $('studentNo').value=data.studentNo||''; $('classSelect').value=data.classLetter||''; $('nextGrade').value=data.nextGrade||''; $('freeText').value=data.freeText||''; $('currentCredits').value=(data.currentCredits??0); $('currentPeCredits').value=(data.currentPeCredits??0); $('showUnavailable').checked=!!data.showUnavailable; applyCompletedMap(data.completedMap||{}); STATE.manual=clone(data.manual||{'X面接指導':{},'Y面接指導':{}}); STATE.lastWarning=''; rerender()}
function clearAll(){applyState({activePeriod:'1',studentName:'',studentNo:'',classLetter:'',nextGrade:'',freeText:'',currentCredits:0,currentPeCredits:0,showUnavailable:false,completedMap:{},manual:{'X面接指導':{},'Y面接指導':{}}})}
window.addEventListener('click',e=>{const btn=e.target.closest('.subject-btn'); if(btn){toggleManual(btn.dataset.section,btn.dataset.period,btn.dataset.label); return} const tab=e.target.closest('[data-period-tab]'); if(tab){STATE.activePeriod=tab.dataset.periodTab; rerender(); return}});
function bindReRender(id){const el=$(id); if(!el)return; el.addEventListener('input',()=>{setWarning(''); rerender()}); el.addEventListener('change',()=>{setWarning(''); rerender()})}
['studentName','studentNo','classSelect','nextGrade','freeText','currentCredits','currentPeCredits','showUnavailable'].forEach(bindReRender); $('printBtn').addEventListener('click',()=>window.print()); $('saveBtn').addEventListener('click',()=>{localStorage.setItem('subjectRegisterRulesV27TabsHScroll',JSON.stringify(collectState())); alert('入力内容を保存しました。')}); $('loadBtn').addEventListener('click',()=>{const raw=localStorage.getItem('subjectRegisterRulesV27TabsHScroll'); if(!raw)return alert('保存データがありません。'); applyState(JSON.parse(raw)); alert('保存データを読み込みました。')}); $('clearBtn').addEventListener('click',clearAll);
populateSelectOptions(); renderCompletedRow(); COMPLETION_CHECKS.forEach(name=>bindReRender(`comp_${name}`)); applyState({activePeriod:'1',studentName:'',studentNo:'',classLetter:'',nextGrade:'',freeText:'',currentCredits:0,currentPeCredits:0,showUnavailable:false,completedMap:{},manual:{'X面接指導':{},'Y面接指導':{}}});
</script></body></html>
